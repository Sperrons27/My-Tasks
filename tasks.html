<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Tasks"/>
  <meta name="theme-color" content="#ffffff"/>
  <title>Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e8e5df;
      --text: #1a1916;
      --muted: #9b9690;
      --subtle: #f0ede8;
      --accent: #2563eb;
      --red: #dc2626;
      --amber: #d97706;
      --green: #16a34a;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
      --radius: 12px;
    }
    html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

    #app { max-width: 600px; margin: 0 auto; padding: 48px 20px 100px; }

    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
    .header-left h1 { font-family: 'DM Serif Display', serif; font-size: 40px; font-weight: 400; line-height: 1.1; color: var(--text); }
    .header-left .date { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .stats-row { display: flex; gap: 20px; margin-top: 14px; }
    .stat { text-align: center; }
    .stat-num { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-top: 2px; }
    .stat-divider { width: 1px; background: var(--border); }
    .bell-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; box-shadow: var(--shadow); transition: background .15s; }
    .bell-btn:hover { background: var(--subtle); }

    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; box-shadow: var(--shadow); }
    .task-input { width: 100%; background: transparent; border: none; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; }
    .task-input::placeholder { color: #c5c0b8; }
    .input-divider { height: 1px; background: var(--border); margin: 14px 0; }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; font-weight: 500; }
    select, input[type=datetime-local] {
      background: var(--subtle); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 12.5px; padding: 7px 10px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; outline: none; -webkit-appearance: none;
    }
    input[type=datetime-local]::-webkit-calendar-picker-indicator { opacity: 0.4; cursor: pointer; }
    .add-btn { margin-left: auto; background: var(--text); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; align-self: flex-end; transition: opacity .15s; }
    .add-btn:hover { opacity: 0.82; }

    .filter-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .filter-tabs { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 3px; gap: 2px; box-shadow: var(--shadow); }
    .chip { background: transparent; border: none; color: var(--muted); border-radius: 6px; padding: 5px 14px; font-size: 12.5px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif; }
    .chip.active { background: var(--text); color: #fff; }
    .cat-select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12.5px; padding: 6px 10px; cursor: pointer; font-family: 'DM Sans', sans-serif; box-shadow: var(--shadow); }

    .section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; padding-left: 2px; }

    .task-list { display: flex; flex-direction: column; gap: 6px; }
    .task { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; box-shadow: var(--shadow); animation: fadeUp .16s ease; transition: opacity .2s, box-shadow .15s; position: relative; }
    .task:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06); }
    .task.done { opacity: 0.42; }
    .task.alerted { border-color: #fde68a; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

    .priority-bar { width: 3px; border-radius: 2px; align-self: stretch; flex-shrink: 0; margin: -2px 0; }
    .check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; flex-shrink: 0; cursor: pointer; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: 11px; color: #fff; }
    .check.checked { background: var(--text); border-color: var(--text); }
    .check:hover:not(.checked) { border-color: var(--text); }

    .task-body { flex: 1; min-width: 0; }
    .task-text { font-size: 14.5px; color: var(--text); display: block; margin-bottom: 6px; line-height: 1.4; }
    .task-text.done { text-decoration: line-through; color: var(--muted); }
    .meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .p-tag { border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
    .c-tag { background: var(--subtle); color: var(--muted); border-radius: 5px; padding: 2px 8px; font-size: 11px; }
    .due-tag { font-size: 11px; color: var(--muted); }
    .due-tag.overdue { color: var(--red); font-weight: 500; }
    .due-tag.alerted { color: var(--amber); font-weight: 500; }

    .del { opacity: 0; background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 3px 6px; transition: opacity .15s, color .15s, background .15s; line-height: 1; border-radius: 5px; flex-shrink: 0; }
    .task:hover .del { opacity: 1; }
    .del:hover { color: var(--red); background: #fef2f2; }

    .empty { text-align: center; color: var(--muted); padding: 56px 0; font-size: 14px; }
    .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.35; }
    .clear-btn { display: block; margin: 16px 0 0 auto; background: none; border: none; color: var(--muted); font-size: 12.5px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .clear-btn:hover { color: var(--red); }
    .hint { margin-top: 36px; color: var(--border); font-size: 11px; text-align: center; }

    #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; border-radius: 10px; padding: 11px 18px; font-size: 13px; font-weight: 500; z-index: 999; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,.18); display: none; align-items: center; gap: 10px; font-family: 'DM Sans', sans-serif; }
    #toast.show { display: flex; animation: slideDown .22s ease; }
    #toast button { background: rgba(255,255,255,.15); border: none; color: #fff; cursor: pointer; font-size: 12px; border-radius: 5px; padding: 3px 8px; font-family: 'DM Sans', sans-serif; }
    @keyframes slideDown { from{opacity:0;transform:translate(-50%,-12px)} to{opacity:1;transform:translate(-50%,0)} }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">
      <h1>My Tasks</h1>
      <div class="date" id="todayDate"></div>
      <div class="stats-row">
        <div class="stat"><div class="stat-num" id="statActive">0</div><div class="stat-label">Active</div></div>
        <div class="stat-divider"></div>
        <div class="stat"><div class="stat-num" id="statDone">0</div><div class="stat-label">Done</div></div>
        <div class="stat-divider"></div>
        <div class="stat"><div class="stat-num" id="statOverdue" style="color:var(--red)">0</div><div class="stat-label">Overdue</div></div>
      </div>
    </div>
    <button class="bell-btn" onclick="testSound()" title="Test sound">🔔</button>
  </div>

  <div class="form-card">
    <input class="task-input" id="taskInput" placeholder="Add a new task…" onkeydown="if(event.key==='Enter')addTask()"/>
    <div class="input-divider"></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Due date & time</label>
        <input type="datetime-local" id="dueInput"/>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select id="priorityInput">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="categoryInput">
          <option>Personal</option><option>Work</option><option>Health</option><option>Shopping</option><option>Other</option>
        </select>
      </div>
      <button class="add-btn" onclick="addTask()">Add Task</button>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-tabs">
      <button class="chip active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="chip" data-filter="active" onclick="setFilter('active')">Active</button>
      <button class="chip" data-filter="done" onclick="setFilter('done')">Done</button>
    </div>
    <select class="cat-select" id="catFilter" onchange="render()">
      <option value="all">All categories</option>
      <option>Personal</option><option>Work</option><option>Health</option><option>Shopping</option><option>Other</option>
    </select>
  </div>

  <div class="section-label" id="sectionLabel"></div>
  <div class="task-list" id="taskList"></div>
  <div class="empty" id="emptyMsg" style="display:none"><div class="empty-icon">📋</div><div id="emptyText">Nothing here yet.</div></div>
  <button class="clear-btn" id="clearBtn" onclick="clearDone()" style="display:none">Clear completed</button>
  <p class="hint">🔔 Sound alert fires at the exact due date & time · checks every 30s</p>
</div>

<div id="toast"><span id="toastMsg"></span><button onclick="hideToast()">Dismiss</button></div>

<script>
  const PSTYLE = {
    high:   { bar:'#ef4444', label:'#dc2626', bg:'#fef2f2' },
    medium: { bar:'#f59e0b', label:'#d97706', bg:'#fffbeb' },
    low:    { bar:'#22c55e', label:'#16a34a', bg:'#f0fdf4' },
  };

  let tasks = JSON.parse(localStorage.getItem('tasks_pro') || '[]');
  let alertedIds = new Set(JSON.parse(localStorage.getItem('alerted_pro') || '[]'));
  let nextId = tasks.length ? Math.max(...tasks.map(t=>t.id))+1 : 1;
  let currentFilter = 'all';
  let toastTimer, audioCtx;

  document.getElementById('todayDate').textContent = new Date().toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' });

  function save() {
    localStorage.setItem('tasks_pro', JSON.stringify(tasks));
    localStorage.setItem('alerted_pro', JSON.stringify([...alertedIds]));
  }

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound() {
    const ctx = getCtx();
    [[0,880],[0.18,1108]].forEach(([t,freq]) => {
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type='sine'; osc.frequency.value=freq;
      g.gain.setValueAtTime(0, ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(0.22, ctx.currentTime+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.5);
      osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+0.55);
    });
  }

  function testSound() { try { playSound(); showToast('🔔 Sound is working!'); } catch(e){} }

  function showToast(msg) {
    document.getElementById('toastMsg').textContent = msg;
    const el = document.getElementById('toast');
    el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(hideToast, 6000);
  }
  function hideToast() { document.getElementById('toast').classList.remove('show'); }

  function nowStr() {
    const d=new Date(), p=n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  const isOverdue = t => !t.done && t.due && new Date(t.due) < new Date();
  const isDueNow  = t => !t.done && t.due && new Date(t.due) <= new Date() && !alertedIds.has(t.id);

  function checkDue() {
    const dueNow = tasks.filter(isDueNow);
    if (!dueNow.length) return;
    try { playSound(); } catch(e){}
    dueNow.forEach(t => alertedIds.add(t.id));
    save();
    showToast('🔔 Due now: ' + dueNow.map(t=>`"${t.text}"`).join(', '));
    render();
  }

  function addTask() {
    const text = document.getElementById('taskInput').value.trim();
    if (!text) return;
    const due = document.getElementById('dueInput').value;
    const task = { id: nextId++, text, done: false, due, priority: document.getElementById('priorityInput').value, category: document.getElementById('categoryInput').value };
    tasks.unshift(task);
    save(); render();
    document.getElementById('taskInput').value = '';
    document.getElementById('dueInput').value = '';
    if (due && new Date(due) <= new Date()) {
      setTimeout(()=>{ try{playSound();}catch(e){} alertedIds.add(task.id); save(); showToast(`🔔 Due now: "${task.text}"`); render(); }, 100);
    }
  }

  function toggleTask(id) {
    const t = tasks.find(t=>t.id===id);
    if (t) { t.done=!t.done; save(); render(); }
  }

  function removeTask(id) {
    tasks=tasks.filter(t=>t.id!==id); alertedIds.delete(id); save(); render();
  }

  function clearDone() { tasks=tasks.filter(t=>!t.done); save(); render(); }

  function setFilter(f) {
    currentFilter=f;
    document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active', c.dataset.filter===f));
    render();
  }

  function formatDue(dt) {
    if (!dt) return '';
    return new Date(dt).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function render() {
    const catFilter = document.getElementById('catFilter').value;
    const visible = tasks.filter(t => {
      const sOk = currentFilter==='all' || (currentFilter==='active'&&!t.done) || (currentFilter==='done'&&t.done);
      return sOk && (catFilter==='all' || t.category===catFilter);
    });

    const active=tasks.filter(t=>!t.done).length;
    const done=tasks.filter(t=>t.done).length;
    const overdue=tasks.filter(isOverdue).length;
    document.getElementById('statActive').textContent=active;
    document.getElementById('statDone').textContent=done;
    document.getElementById('statOverdue').textContent=overdue;
    document.getElementById('clearBtn').style.display=done>0?'block':'none';
    document.getElementById('sectionLabel').textContent=visible.length?`${visible.length} task${visible.length!==1?'s':''}` : '';

    const empty=document.getElementById('emptyMsg');
    empty.style.display=visible.length===0?'block':'none';
    document.getElementById('emptyText').textContent=tasks.length===0?'Nothing here yet.':'No matching tasks.';
    empty.querySelector('.empty-icon').textContent=tasks.length===0?'📋':'🔍';

    const list=document.getElementById('taskList');
    list.innerHTML='';
    visible.forEach(t => {
      const ps=PSTYLE[t.priority];
      const overdue=isOverdue(t);
      const alerted=alertedIds.has(t.id);
      const dueIcon=overdue?'⚠':alerted&&!t.done?'🔔':'⏰';
      const dueClass=overdue?'overdue':alerted&&!t.done?'alerted':'';
      const el=document.createElement('div');
      el.className='task'+(t.done?' done':'')+(alerted&&!t.done?' alerted':'');
      el.innerHTML=`
        <div class="priority-bar" style="background:${ps.bar}"></div>
        <button class="check ${t.done?'checked':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</button>
        <div class="task-body">
          <span class="task-text ${t.done?'done':''}">${t.text}</span>
          <div class="meta">
            <span class="p-tag" style="background:${ps.bg};color:${ps.label}">${t.priority}</span>
            <span class="c-tag">${t.category}</span>
            ${t.due?`<span class="due-tag ${dueClass}">${dueIcon} ${formatDue(t.due)}</span>`:''}
          </div>
        </div>
        <button class="del" onclick="removeTask(${t.id})">✕</button>`;
      list.appendChild(el);
    });
  }

  document.getElementById('dueInput').min = nowStr();
  checkDue();
  setInterval(checkDue, 30000);
  render();
</script>
</body>
</html>
